name: hotel_reservasi
description: Aplikasi Mobile Reservasi Hotel Grand Mugarsari
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Local Storage (JWT Token)
  shared_preferences: ^2.2.3

  # Calendar (Google Material Calendar)
  table_calendar: ^3.1.2

  # Animations
  flutter_animate: ^4.5.0

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
